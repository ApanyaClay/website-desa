services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: desa_app
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=website_desa
      - DB_USERNAME=postgres
      - DB_PASSWORD=secretpassword
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: desa_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=website_desa
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secretpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
